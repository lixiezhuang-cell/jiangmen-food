<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <title>今晚吃什么</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="today-panel" id="todayView" aria-labelledby="app-title">
        <div class="topbar">
          <div>
            <p class="eyebrow" id="dateLabel">2026</p>
            <h1 id="app-title">今晚吃什么</h1>
          </div>
        </div>

        <article class="recommendation" aria-live="polite">
          <h2 id="comboTitle">加载中</h2>
          <div class="duplicate-note" id="duplicateNote" hidden></div>
          <div class="dish-list" id="dishList"></div>
        </article>

        <div class="actions">
          <button class="secondary-button" id="recordButton" type="button">记录</button>
          <button class="ghost-button" id="copyButton" type="button">复制</button>
        </div>

        <div class="date-row">
          <label for="datePicker">查日期</label>
          <input id="datePicker" type="date" min="2026-01-01" max="2026-12-31" />
        </div>

        <span class="toast-pill" id="toast" role="status"></span>

        <section class="home-week-panel" id="homeWeekPanel" aria-labelledby="week-title">
          <div class="section-header">
            <h2 id="week-title">未来 10 天</h2>
          </div>
          <div class="week-list" id="weekList"></div>
        </section>
      </section>
    </main>

    <div class="sheet-overlay" id="sheetOverlay" hidden></div>
    <section class="app-sheet" id="appSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle" hidden>
      <div class="sheet-grabber" aria-hidden="true"></div>
      <div class="sheet-head">
        <div>
          <p class="sheet-eyebrow" id="sheetEyebrow">今晚吃什么</p>
          <h2 id="sheetTitle">详情</h2>
        </div>
        <button class="icon-button small" id="sheetCloseButton" type="button" aria-label="关闭">×</button>
      </div>

      <div class="sheet-body">
        <section class="sheet-panel data-panel" id="yearView" data-sheet-panel="year" hidden>
          <div class="section-header">
            <h2>全年日历</h2>
            <span id="yearCount"></span>
          </div>
          <div class="filter-row">
            <input id="yearDatePicker" type="date" min="2026-01-01" max="2026-12-31" />
            <input id="yearSearchInput" type="search" placeholder="搜索日期 / 菜名 / 风格" />
          </div>
          <article class="selected-day" id="yearSelected"></article>
          <div class="year-calendar" id="yearCalendar"></div>
        </section>

        <section class="sheet-panel data-panel records-panel" id="recordsView" data-sheet-panel="records" hidden>
          <div class="section-header">
            <h2 id="records-title">日期记录表</h2>
            <span id="recordCount"></span>
          </div>
          <div class="record-list" id="recordList"></div>
        </section>

        <section class="sheet-panel data-panel" id="catalogView" data-sheet-panel="catalog" hidden>
          <div class="section-header">
            <h2>总菜谱</h2>
            <div class="catalog-head-actions">
              <span id="catalogCount"></span>
              <button class="ghost-button compact-button" id="catalogEditButton" type="button" aria-pressed="false">编辑</button>
            </div>
          </div>
          <div class="filter-row single">
            <input id="catalogSearchInput" type="search" placeholder="搜索菜名" />
          </div>
          <div class="catalog-editor" id="catalogEditor" hidden>
            <input id="customDishInput" type="text" placeholder="新增菜名" />
            <button class="secondary-button" id="addDishButton" type="button">添加</button>
          </div>
          <div class="catalog-hint" id="catalogHint"></div>
          <div class="catalog-list" id="catalogList"></div>
        </section>

        <section class="sheet-panel more-panel" id="moreView" data-sheet-panel="more" hidden>
          <div class="more-grid">
            <button class="more-card" type="button" data-sheet-target="year">
              <span>全年日历</span>
              <strong>按日期和菜名搜索</strong>
            </button>
            <button class="more-card" type="button" data-sheet-target="records">
              <span>日期记录</span>
              <strong>改备注和已吃菜</strong>
            </button>
            <button class="more-card" type="button" data-sheet-target="catalog">
              <span>总菜谱</span>
              <strong>添加、删除、替换菜</strong>
            </button>
            <button class="more-card" type="button" data-open-rules>
              <span>点菜规则</span>
              <strong>查看忌口和搭配边界</strong>
            </button>
          </div>
        </section>
      </div>
    </section>

    <nav class="dock-nav" aria-label="底部操作">
      <button class="dock-button active" id="todayButton" type="button" data-view="today">今日</button>
      <button id="dockShuffleButton" class="dock-button dock-shuffle-button" type="button" data-shuffle>换一个</button>
      <button class="dock-button" type="button" data-view="more">更多</button>
    </nav>

    <dialog id="ruleDialog" class="rule-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <h2>点菜规则</h2>
          <button class="icon-button small" value="close" aria-label="关闭">×</button>
        </div>
        <ul>
          <li>无饭，粉面粥只偶尔出现。</li>
          <li>避开鹅翼、鹅肠、鸭掌、海带结、鸭胗和指定点心。</li>
          <li>避开虾蟹和不适小海鲜；鱿鱼、田螺、鱼、黄沙蚬、青口可以。</li>
          <li>二人搭配，10 天内同一道菜不重复，同一顿不叠同类食材。</li>
        </ul>
      </form>
    </dialog>

    <dialog id="shuffleDialog" class="shuffle-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <div>
            <p class="dialog-eyebrow" id="shuffleDialogDate">今日</p>
            <h2>换成这组？</h2>
          </div>
          <button class="icon-button small" value="cancel" aria-label="关闭">×</button>
        </div>
        <div class="shuffle-dialog-dishes" id="shuffleDialogDishes"></div>
        <div class="shuffle-dialog-actions">
          <button class="ghost-button" id="shuffleRefreshButton" type="button">再换一个</button>
          <button class="secondary-button" value="cancel" type="submit">取消</button>
          <button class="primary-button" id="shuffleConfirmButton" type="button">确认替换</button>
        </div>
      </form>
    </dialog>

    <script src="./src/menu-data.js"></script>
    <script src="./src/core-browser.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
