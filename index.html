<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <title>今晚吃什么</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="view-tabs" aria-label="菜单视图">
        <button class="view-tab active" type="button" data-view="today">今日</button>
        <button class="view-tab" type="button" data-view="year">全年</button>
        <button class="view-tab" type="button" data-view="records">记录</button>
        <button class="view-tab" type="button" data-view="catalog">菜谱</button>
      </nav>

      <section class="view-panel active" id="todayView" data-view-panel="today">
        <section class="today-panel" aria-labelledby="app-title">
          <div class="topbar">
            <div>
              <p class="eyebrow" id="dateLabel">2026</p>
              <h1 id="app-title">今晚吃什么</h1>
            </div>
            <button class="icon-button" id="ruleButton" type="button" aria-label="忌口规则">!</button>
          </div>

          <article class="recommendation" aria-live="polite">
            <div class="recommendation-head">
              <div class="style-pill" id="styleLabel">江门广式</div>
              <span class="smart-badge">Smart Pick</span>
            </div>
            <h2 id="comboTitle">加载中</h2>
            <p class="recommend-reason" id="recommendReason"></p>
            <div class="insight-grid" id="insightGrid"></div>
            <div class="duplicate-note" id="duplicateNote" hidden></div>
            <div class="dish-list" id="dishList"></div>
          </article>

          <div class="actions">
            <button class="primary-button" id="copyButton" type="button">复制</button>
            <button class="secondary-button" id="shuffleButton" type="button">换一个</button>
            <button class="secondary-button" id="recordButton" type="button">记录</button>
            <button class="ghost-button" id="todayButton" type="button">今天</button>
          </div>

          <div class="date-row">
            <label for="datePicker">查日期</label>
            <input id="datePicker" type="date" min="2026-01-01" max="2026-12-31" />
          </div>
        </section>

        <section class="week-panel" aria-labelledby="week-title">
          <div class="section-header">
            <h2 id="week-title">未来 10 天</h2>
            <span id="toast" role="status"></span>
          </div>
          <div class="week-list" id="weekList"></div>
        </section>

      </section>

      <section class="view-panel data-panel" id="yearView" data-view-panel="year" hidden>
        <div class="section-header">
          <h2>全年日历</h2>
          <span id="yearCount"></span>
        </div>
        <div class="filter-row">
          <input id="yearDatePicker" type="date" min="2026-01-01" max="2026-12-31" />
          <input id="yearSearchInput" type="search" placeholder="搜索日期 / 菜名 / 风格" />
        </div>
        <article class="selected-day" id="yearSelected"></article>
        <div class="year-calendar" id="yearCalendar"></div>
      </section>

      <section class="view-panel data-panel records-panel" id="recordsView" data-view-panel="records" hidden>
        <div class="section-header">
          <h2 id="records-title">日期记录表</h2>
          <span id="recordCount"></span>
        </div>
        <div class="record-list" id="recordList"></div>
      </section>

      <section class="view-panel data-panel" id="catalogView" data-view-panel="catalog" hidden>
        <div class="section-header">
          <h2>总菜谱</h2>
          <div class="catalog-head-actions">
            <span id="catalogCount"></span>
            <button class="ghost-button compact-button" id="catalogEditButton" type="button" aria-pressed="false">编辑</button>
          </div>
        </div>
        <div class="filter-row single">
          <input id="catalogSearchInput" type="search" placeholder="搜索菜名" />
        </div>
        <div class="catalog-editor" id="catalogEditor" hidden>
          <input id="customDishInput" type="text" placeholder="新增菜名" />
          <button class="secondary-button" id="addDishButton" type="button">添加</button>
        </div>
        <div class="catalog-hint" id="catalogHint"></div>
        <div class="catalog-list" id="catalogList"></div>
      </section>
    </main>

    <dialog id="ruleDialog" class="rule-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <h2>点菜规则</h2>
          <button class="icon-button small" value="close" aria-label="关闭">×</button>
        </div>
        <ul>
          <li>无饭，粉面粥只偶尔出现。</li>
          <li>避开鹅翼、鹅肠、鸭掌、海带结、鸭胗和指定点心。</li>
          <li>避开虾蟹和不适小海鲜；鱿鱼、田螺、鱼、黄沙蚬、青口可以。</li>
          <li>二人搭配，10 天内同一道菜不重复，同一顿不叠同类食材。</li>
        </ul>
      </form>
    </dialog>

    <script src="./src/menu-data.js"></script>
    <script src="./src/core-browser.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
